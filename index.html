<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Georgia', serif; color: #e8e0d0;
           overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    #hud { display: none; align-items: center; gap: 14px; padding: 7px 14px;
           background: #0f0f1e; border-bottom: 2px solid #8b6914; flex-shrink: 0; }
    .hud-stat { display: flex; align-items: center; gap: 5px; font-size: 13px; }
    .hud-val { font-weight: bold; color: #ffd700; font-size: 15px; }
    .hud-lbl { color: #aaa; font-size: 11px; }
    #speed-btn { background: #1a2a1a; border: 1px solid #4a6a4a; color: #aaddaa;
                 padding: 4px 9px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    #game { flex: 1; position: relative; min-height: 0; overflow: hidden; }
    #game canvas { display: block; width: 100% !important; height: 100% !important; }
    #bottom-bar { display: none; align-items: center; gap: 8px; padding: 8px 14px;
                  background: #0f0f1e; border-top: 2px solid #8b6914; flex-shrink: 0; }
    .tower-btn { background: #1a1a3a; border: 2px solid #444; border-radius: 6px;
                 padding: 6px 10px; cursor: pointer; display: flex; flex-direction: column;
                 align-items: center; gap: 2px; transition: all 0.15s; color: #e8e0d0; }
    .tower-btn:hover { border-color: #ffd700; background: #252545; }
    .tower-btn.selected { border-color: #ffd700; background: #2a2a1a; }
    .tower-btn .t-icon { font-size: 20px; }
    .tower-btn .t-cost { font-size: 11px; color: #ffd700; }
    .tower-btn .t-name { font-size: 10px; color: #aaa; }
    #wave-btn { margin-left: auto; background: #8b1a1a; border: 2px solid #cc3333;
                color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer;
                font-size: 13px; font-weight: bold; }
    #wave-btn:hover { background: #aa2222; }
    #wave-btn:disabled { background: #333; border-color: #555; color: #666; cursor: not-allowed; }
    #tower-panel { position: absolute; background: #0f0f1e; border: 2px solid #8b6914;
                   border-radius: 8px; padding: 11px; width: 170px; z-index: 10; display: none; }
    #tower-panel .panel-name { font-size: 13px; font-weight: bold; color: #ffd700; margin-bottom: 5px; }
    #tower-panel .panel-stat { font-size: 11px; color: #aaa; margin: 2px 0; }
    #tower-panel .upgrade-btn { width: 100%; background: #1a3a1a; border: 1px solid #4a8a4a;
                                 color: #7af07a; padding: 5px; border-radius: 4px;
                                 cursor: pointer; font-size: 11px; margin-top: 4px; }
    #tower-panel .upgrade-btn:hover { background: #2a4a2a; }
    #tower-panel .upgrade-btn.maxed { background: #1a1a3a; border-color: #4a4aaa;
                                       color: #7a7af0; cursor: default; }
    #tower-panel .sell-btn { width: 100%; background: #3a1a1a; border: 1px solid #8a3a3a;
                              color: #f07a7a; padding: 5px; border-radius: 4px;
                              cursor: pointer; font-size: 11px; margin-top: 3px; }
    .branch-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
                     color: #f0a500; margin-bottom: 7px; }
    .branch-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 8px; }
    .branch-card { border: 1px solid #555; border-radius: 5px; padding: 7px; font-size: 11px; }
    .branch-card:not(.locked) { border-color: #f0a500; background: #1a1400; }
    .branch-card.locked { opacity: 0.45; }
    .branch-label { font-weight: bold; margin-bottom: 3px; }
    .branch-effect { color: #888; margin-bottom: 4px; font-size: 10px; }
    .branch-cost { color: #f0a500; font-weight: bold; margin-bottom: 5px; }
    .reposition-btn { width: 100%; background: #1a2a3a; border: 1px solid #4fc3f7;
                      color: #4fc3f7; padding: 5px; border-radius: 4px;
                      cursor: pointer; font-size: 11px; margin-top: 3px; }
    .reposition-btn:hover { background: #223344; }
    #game-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.88); border: 3px solid #8b6914; border-radius: 12px;
                padding: 28px 38px; text-align: center; display: none; z-index: 20; }
    #game-msg h2 { font-size: 26px; margin-bottom: 8px; }
    #game-msg p { color: #aaa; margin-bottom: 14px; font-size: 13px; }
    #game-msg button { background: #8b6914; border: none; color: #fff; padding: 9px 22px;
                       border-radius: 6px; cursor: pointer; font-size: 14px; }
    .story-banner { position:absolute; top:-130px; left:5%; right:5%; background:linear-gradient(135deg,#0a1a2a,#0a2a1a);
                    border:1px solid #2a5a3a; border-radius:8px; padding:12px 16px; z-index:25;
                    display:flex; align-items:flex-start; gap:12px;
                    transition:transform 0.35s ease; pointer-events:none; }
    .story-banner.visible { transform:translateY(145px); pointer-events:auto; }
    .story-content { flex:1; }
    #story-headline { font-size:10px; color:#5a9a6a; letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
    #story-body { font-size:13px; color:#ddd; line-height:1.6; }
    #story-dismiss { background:transparent; border:1px solid #3a6a4a; color:#7aba8a;
                     padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; flex-shrink:0; }
    #story-dismiss:hover { background:#1a2a1a; }
    #map-select { display:none; position:absolute; inset:0; background:#08081e; z-index:5;
                  padding:20px; flex-direction:column; font-family:'Georgia',serif; }
    #map-select-title { font-size:34px; color:#ffd700; font-weight:bold; text-align:center;
                        margin-bottom:18px; letter-spacing:4px; }
    #map-select-layout { display:flex; gap:16px; flex:1; min-height:0; overflow:hidden; }
    #map-sidebar { width:230px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
    #map-featured { flex:1; border:2px solid #8b6914; border-radius:10px; background:#0f0f2e;
                    padding:22px; display:flex; flex-direction:column; }
    #featured-name { font-size:22px; color:#ffd700; font-weight:bold; margin-bottom:6px; }
    #featured-stars { font-size:22px; color:#ffd700; margin-bottom:14px; }
    #featured-blurb { color:#aaa; font-size:14px; line-height:1.6; flex:1; margin-bottom:14px; }
    #featured-tier { color:#7ab8ff; font-size:13px; margin-bottom:18px; }
    #featured-play { background:#8b1a1a; border:none; color:#fff; padding:12px 28px;
                     border-radius:6px; cursor:pointer; font-size:16px; font-weight:bold;
                     align-self:flex-start; }
    #featured-play:hover { background:#aa2222; }
    .map-row { border-radius:5px; padding:8px 10px; }
    .map-row.unlocked { background:#1a2e1a; border:1px solid #4a6a4a; color:#ccc; cursor:pointer; }
    .map-row.unlocked:hover { border-color:#ffd700; background:#252515; }
    .map-row.unlocked.active { border-color:#ffd700; background:#2a2a1a; }
    .map-row.locked { background:#111; border:1px dashed #333; color:#555; }
    .map-row-name { font-size:12px; font-weight:bold; }
    .map-row-stars { font-size:11px; color:#ffd700; min-height:16px; }
    #hero-section { display:flex; align-items:center; gap:6px; }
    #hero-portrait { width:30px; height:30px; border-radius:50%; background:#1a2a4a;
                     border:2px solid #4fc3f7; display:flex; align-items:center;
                     justify-content:center; font-size:13px; color:#4fc3f7; font-weight:bold; }
    #hero-info { display:flex; flex-direction:column; gap:3px; }
    #hero-level { font-size:10px; color:#4fc3f7; }
    #hero-hp-bg { width:52px; height:5px; background:#333; border-radius:2px; overflow:hidden; }
    #hero-hp-fill { height:100%; background:#4fc3f7; border-radius:2px; transition:width 0.15s; }
    .ability-btn { background:#1a2a3a; border:2px solid #4fc3f7; border-radius:5px;
                   padding:4px 7px; cursor:pointer; display:flex; flex-direction:column;
                   align-items:center; gap:1px; color:#4fc3f7; font-family:'Georgia',serif; }
    .ability-btn.locked { background:#111; border-color:#333; color:#444; cursor:default; }
    .ability-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .ability-btn:not(:disabled):not(.locked):hover { background:#253a4a; }
    .ability-key  { font-size:11px; font-weight:bold; letter-spacing:1px; }
    .ability-name { font-size:12px; }
    .ability-cd   { font-size:9px; color:#aaa; min-height:11px; }
    .bar-divider  { width:1px; height:36px; background:#333; flex-shrink:0; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="hud-stat"><span>❤️</span><span class="hud-val" id="stat-lives">20</span><span class="hud-lbl">Lives</span></div>
    <div class="hud-stat"><span>💰</span><span class="hud-val" id="stat-gold">150</span><span class="hud-lbl">Gold</span></div>
    <div class="hud-stat"><span>🌊</span><span class="hud-val" id="stat-wave">0/10</span><span class="hud-lbl">Wave</span></div>
    <div class="hud-stat"><span>💀</span><span class="hud-val" id="stat-kills">0</span><span class="hud-lbl">Kills</span></div>
    <button id="speed-btn">⏩ 2x</button>
  </div>
  <div id="game">
    <div id="story-banner" class="story-banner">
      <div class="story-content">
        <div id="story-headline"></div>
        <div id="story-body"></div>
      </div>
      <button id="story-dismiss">&#10005;</button>
    </div>
    <div id="map-select">
      <div id="map-select-title">LAST LIGHT</div>
      <div id="map-select-layout">
        <div id="map-sidebar"></div>
        <div id="map-featured">
          <div id="featured-name"></div>
          <div id="featured-stars"></div>
          <div id="featured-blurb"></div>
          <div id="featured-tier"></div>
          <button id="featured-play">&#9654; PLAY</button>
        </div>
      </div>
    </div>
    <div id="tower-panel">
      <div class="panel-name" id="panel-name">Tower</div>
      <div id="panel-std-stats">
        <div class="panel-stat" id="panel-dmg">Damage: -</div>
        <div class="panel-stat" id="panel-rng">Range: -</div>
        <div class="panel-stat" id="panel-spd">Fire rate: -</div>
      </div>
      <div id="panel-barracks-stats" style="display:none">
        <div class="panel-stat" id="panel-soldier-count">Soldiers: -</div>
        <div class="panel-stat" id="panel-soldier-hp">HP: -</div>
        <div class="panel-stat" id="panel-soldier-dmg">DMG: -</div>
        <div class="panel-stat" id="panel-soldier-respawn">Respawn: -</div>
        <div class="panel-stat" id="panel-soldier-blocks">Blocks: -</div>
      </div>
      <div class="panel-stat" id="panel-lvl">Level: -</div>
      <div id="panel-branch-picker" style="display:none"></div>
      <button class="upgrade-btn" id="panel-upgrade-btn">Upgrade</button>
      <button class="reposition-btn" id="panel-reposition-btn" style="display:none">&#8635; Reposition Soldiers</button>
      <button class="sell-btn" id="panel-sell-btn">&#128176; Sell</button>
    </div>
    <div id="game-msg">
      <h2 id="msg-title">Victory!</h2>
      <p id="msg-body">You defended humanity!</p>
      <button id="msg-btn">&#8617; Map Select</button>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="hero-section">
      <div id="hero-portrait">R</div>
      <div id="hero-info">
        <div id="hero-level">Rael L1</div>
        <div id="hero-hp-bg"><div id="hero-hp-fill"></div></div>
      </div>
      <button class="ability-btn" id="ability-q" disabled title="Overcharge — +50% tower fire rate 6s">
        <span class="ability-key">Q</span><span class="ability-name">⚡</span><span class="ability-cd"></span>
      </button>
      <button class="ability-btn locked" id="ability-w" disabled title="Airstrike — AoE damage on target area">
        <span class="ability-key">W</span><span class="ability-name">🎯</span><span class="ability-cd"></span>
      </button>
      <button class="ability-btn locked" id="ability-e" disabled title="EMP Pulse — stuns all aliens 3s">
        <span class="ability-key">E</span><span class="ability-name">💥</span><span class="ability-cd"></span>
      </button>
    </div>
    <div class="bar-divider"></div>
    <button class="tower-btn" data-type="archer">
      <span class="t-icon">🏹</span><span class="t-cost">60g</span><span class="t-name">Archer</span>
    </button>
    <button class="tower-btn" data-type="mage">
      <span class="t-icon">🔮</span><span class="t-cost">90g</span><span class="t-name">Mage</span>
    </button>
    <button class="tower-btn" data-type="cannon">
      <span class="t-icon">💣</span><span class="t-cost">110g</span><span class="t-name">Cannon</span>
    </button>
    <button class="tower-btn" data-type="ice">
      <span class="t-icon">❄️</span><span class="t-cost">80g</span><span class="t-name">Ice</span>
    </button>
    <button class="tower-btn" data-type="sniper">
      <span class="t-icon">🎯</span><span class="t-cost">120g</span><span class="t-name">Sniper</span>
    </button>
    <button class="tower-btn" data-type="barracks">
      <span class="t-icon">⚔️</span><span class="t-cost">100g</span><span class="t-name">Barracks</span>
    </button>
    <button id="wave-btn">▶ Send Wave 1</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
